name: Claude Code

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# ---------------------------------------------------------------------------
# JOB 1 — Interactive: responds to @claude mentions in issues / PRs
# ---------------------------------------------------------------------------
jobs:
  claude-interactive:
    name: Claude Interactive (@claude)
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code (interactive mode)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

  # ---------------------------------------------------------------------------
  # JOB 2 — Automated: Claude generates tests → pytest runs → artifact uploaded
  #
  # Split into two phases so pytest has a real exit code for branch protection:
  #   Step A: Claude explores code and WRITES test files (no execution)
  #   Step B: Runner executes pytest, saves report to test-report/
  #   Step C: Artifact uploaded (always, even on failure)
  #
  # To block merges on test failure:
  #   GitHub → Settings → Branches → Branch protection rule for `main`
  #   → "Require status checks to pass before merging"
  #   → Add: "Claude — Generate Tests / Run pytest & upload report"
  # ---------------------------------------------------------------------------
  claude-test-generator:
    name: Claude — Generate Tests / Run pytest & upload report
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create .venv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # STEP A — Claude explores the codebase and writes test files only.
      # It does NOT run pytest — that is handled by the next step so the
      # runner process owns the exit code (needed for branch protection).
      # -----------------------------------------------------------------------
      - name: Claude — Analyze codebase & write tests
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a Python test engineer. Your task is to explore this repository,
            understand what the code does, and write comprehensive pytest tests.
            Do NOT execute pytest — a separate CI step will run the tests.

            ═══════════════════════════════════════
            PHASE 1 — EXPLORE THE CODEBASE
            ═══════════════════════════════════════
            • Use Glob to discover all source files (*.py, etc.)
            • Read every source file to understand:
                - What the application does
                - Public interfaces (functions, classes, API endpoints, CLI commands)
                - Data models and validation rules
                - Error conditions and edge cases
                - Any existing tests (to avoid duplication)
            • Check requirements.txt / pyproject.toml for the test framework in use

            ═══════════════════════════════════════
            PHASE 2 — PLAN THE TESTS
            ═══════════════════════════════════════
            For each module / component you discovered, identify:
              ✔ Happy-path cases (valid input → expected output)
              ✔ Edge cases (boundary values, empty collections, zero, max limits)
              ✔ Error cases (invalid input, missing required data, unauthorized access)
              ✔ State interactions (does earlier state affect later behaviour?)

            pytest rules to follow:
              • One assertion concept per test function — keep tests focused
              • Use descriptive names: test_<what>_<condition>_<expected>
              • Use fixtures for shared setup/teardown; reset mutable state between tests
              • Parametrize repetitive cases with @pytest.mark.parametrize
              • Mark async tests with @pytest.mark.asyncio when needed
              • Never rely on test execution order — each test must be independent

            Example fixture pattern for resetting in-memory state:
            ```python
            import pytest

            @pytest.fixture(autouse=True)
            def reset_state():
                # reset any module-level stores / caches before each test
                yield
                # optional teardown here
            ```

            Example parametrize pattern:
            ```python
            @pytest.mark.parametrize("payload,expected_status", [
                ({"valid": "data"}, 200),
                ({},               422),
                ({"bad": "field"}, 422),
            ])
            def test_endpoint_validation(client, payload, expected_status):
                response = client.post("/endpoint", json=payload)
                assert response.status_code == expected_status
            ```

            Example FastAPI TestClient pattern (if the app uses FastAPI):
            ```python
            from fastapi.testclient import TestClient
            from <app_module> import app

            client = TestClient(app)

            def test_health_check():
                response = client.get("/")
                assert response.status_code == 200
            ```

            ═══════════════════════════════════════
            PHASE 3 — WRITE THE TESTS
            ═══════════════════════════════════════
            • Write all tests to the appropriate file(s) under tests/
              (create the file if it does not exist; follow existing naming conventions)
            • Aim for maximum coverage of the behaviours you identified
            • Include a brief comment above each test group explaining what is tested
            • STOP here — do not run pytest

          claude_args: >-
            --max-turns 20
            --allowedTools "Read,Write,Edit,Glob"

      # -----------------------------------------------------------------------
      # STEP B — Runner executes pytest.
      # Exit code propagates to the job → branch protection can gate on this.
      # Output is tee'd to a file for the artifact upload in Step C.
      # -----------------------------------------------------------------------
      - name: Run pytest & save report
        run: |
          mkdir -p test-report
          source .venv/bin/activate
          python -m pytest tests/ -v --tb=short 2>&1 | tee test-report/pytest-report.txt
          # Preserve pytest's exit code through the pipe
          exit ${PIPESTATUS[0]}

      # -----------------------------------------------------------------------
      # STEP C — Upload the report as a GitHub Actions artifact.
      # `if: always()` ensures upload even when pytest fails.
      # -----------------------------------------------------------------------
      - name: Upload pytest report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report
          path: test-report/pytest-report.txt
          retention-days: 14
