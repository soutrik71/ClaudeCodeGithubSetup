name: Claude Code

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# ---------------------------------------------------------------------------
# JOB 1 — Interactive: responds to @claude mentions in issues / PRs
# ---------------------------------------------------------------------------
jobs:
  claude-interactive:
    name: Claude Interactive (@claude)
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code (interactive mode)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

  # ---------------------------------------------------------------------------
  # JOB 2 — Automated: Claude generates tests → pytest runs → artifact uploaded
  #
  # Split into two phases so pytest has a real exit code for branch protection:
  #   Step A: Claude explores code and WRITES test files (no execution)
  #   Step B: Runner executes pytest, saves report to test-report/
  #   Step C: Artifact uploaded (always, even on failure)
  #
  # To block merges on test failure:
  #   GitHub → Settings → Branches → Branch protection rule for `main`
  #   → "Require status checks to pass before merging"
  #   → Add: "Claude — Generate Tests / Run pytest & upload report"
  # ---------------------------------------------------------------------------
  claude-test-generator:
    name: Claude — Generate Tests / Run pytest & upload report
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create .venv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # STEP A — Claude explores the codebase and writes test files only.
      # It does NOT run pytest — that is handled by the next step so the
      # runner process owns the exit code (needed for branch protection).
      # -----------------------------------------------------------------------
      - name: Claude — Analyze codebase & write tests
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a senior Python test engineer with zero tolerance for broken tests.
            Your task is to explore this repository, deeply understand the source code,
            and write pytest tests that are CORRECT AND PASSING on the very first run.
            Do NOT execute pytest — a separate CI step will run the tests.

            ══════════════════════════════════════════════
            PRIME DIRECTIVE — TESTS MUST PASS FIRST TIME
            ══════════════════════════════════════════════
            Before writing a single line of test code you must fully understand:
              • Every import path — read the actual source files to get exact module names
              • Every function/class signature — do not guess argument names or types
              • Every Pydantic model field — names, types, required vs optional, defaults
              • Every API route — method, path, required body/query params, response shape
              • Every in-memory store — how it is initialised and mutated
              • Every dependency — what Depends() callables inject and how to override them

            A test that fails because of a wrong import, wrong field name, wrong HTTP
            method, or wrong assertion value is a defect YOU introduced. Treat it as
            such: read before you write, verify before you save.

            ═══════════════════════════════════════
            PHASE 1 — DEEP CODEBASE EXPLORATION
            ═══════════════════════════════════════
            1. Use Glob to discover ALL source files (*.py, *.toml, *.cfg, *.ini)
            2. Read EVERY source file in full — no skimming:
                - Exact module hierarchy (package __init__.py files matter)
                - Every public function and class with its exact signature
                - Every API endpoint: method, path, request model, response model, status codes
                - Every Pydantic model: all field names, types, validators, defaults
                - Every Depends() callable: what it returns, how to override in tests
                - Every in-memory store (dict/list): initial state and mutation patterns
                - Every raised HTTPException: status code and detail string
                - Any auth/API-key guards and how to satisfy them in tests
            3. Read requirements.txt / pyproject.toml — note exact package names and versions
            4. Read every existing test file — understand conventions and avoid duplication

            ═══════════════════════════════════════
            PHASE 2 — PLAN BEFORE YOU CODE
            ═══════════════════════════════════════
            For each component produce a written plan covering:
              ✔ Happy-path cases (valid input → expected output / status)
              ✔ Edge cases (boundary values, empty collections, zero, max limits)
              ✔ Error cases (invalid input, missing fields, wrong types, unauthorised)
              ✔ State isolation (how mutable stores are reset between tests)
              ✔ Exact import statements you will use (verify the path exists in source)
              ✔ Exact field names from Pydantic models (copy from source, do not guess)
              ✔ Exact route paths (copy from router source, do not guess)

            pytest rules:
              • One assertion concept per test — keep tests focused
              • Descriptive names: test_<what>_<condition>_<expected_outcome>
              • Fixtures for all shared setup; autouse fixture resets mutable state
              • @pytest.mark.parametrize for repetitive input/output variations
              • @pytest.mark.asyncio only if the code is genuinely async
              • Never depend on test execution order — full isolation per test

            ═══════════════════════════════════════
            PHASE 3 — WRITE & SELF-REVIEW THE TESTS
            ═══════════════════════════════════════
            Write tests to the appropriate file(s) under tests/.
            After drafting EACH test function, perform this mental checklist:

              □ Import paths — do these modules actually exist at these paths?
              □ Fixture names — are they defined and spelled correctly?
              □ Model field names — copied verbatim from the Pydantic source?
              □ HTTP method & path — matches the router decorator exactly?
              □ Request payload — satisfies all required fields, correct types?
              □ Expected status code — matches what the route actually returns?
              □ Expected response keys — match the actual response model fields?
              □ Store reset — will mutable state from this test leak into the next?
              □ Dependency overrides — are FastAPI app.dependency_overrides set and cleared?

            If any checkbox would be "no" or "unsure" — go back and re-read the source.
            Do not write the test until every checkbox is confidently "yes".

            Example: fixture resetting in-memory store (read the actual store variable
            name from source before using it):
            ```python
            import pytest
            from app.routers import items   # verify this import path in source first

            @pytest.fixture(autouse=True)
            def reset_stores():
                items._store.clear()        # use the exact variable name from source
                yield
                items._store.clear()
            ```

            Example: parametrize pattern:
            ```python
            @pytest.mark.parametrize("payload,expected_status", [
                ({"name": "widget", "price": 9.99}, 201),   # field names from source
                ({},                                  422),
                ({"name": "x"},                       422),  # missing required 'price'
            ])
            def test_create_item_validation(client, payload, expected_status):
                response = client.post("/items/", json=payload)
                assert response.status_code == expected_status
            ```

            Example: FastAPI TestClient with dependency override:
            ```python
            import pytest
            from fastapi.testclient import TestClient
            from app.main import app                        # verify path in source
            from app.dependencies import get_api_key        # verify path in source

            @pytest.fixture
            def client():
                app.dependency_overrides[get_api_key] = lambda: "test-key"
                yield TestClient(app)
                app.dependency_overrides.clear()
            ```

            STOP after writing and self-reviewing all tests — do not run pytest.

          claude_args: >-
            --max-turns 20
            --allowedTools "Read,Write,Edit,Glob"

      # -----------------------------------------------------------------------
      # STEP B — Runner executes pytest.
      # Exit code propagates to the job → branch protection can gate on this.
      # Output is tee'd to a file for the artifact upload in Step C.
      # -----------------------------------------------------------------------
      - name: Run pytest & save report
        run: |
          mkdir -p test-report
          source .venv/bin/activate
          python -m pytest tests/ -v --tb=short 2>&1 | tee test-report/pytest-report.txt
          # Preserve pytest's exit code through the pipe
          exit ${PIPESTATUS[0]}

      # -----------------------------------------------------------------------
      # STEP C — Upload the report as a GitHub Actions artifact.
      # `if: always()` ensures upload even when pytest fails.
      # -----------------------------------------------------------------------
      - name: Upload pytest report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report
          path: test-report/pytest-report.txt
          retention-days: 14
